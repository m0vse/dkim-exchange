name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Install .NET Framework Developer Packs
        shell: powershell
        run: |
          choco install netfx-4.8-devpack --yes --no-progress
          choco install netfx-4.8.1-devpack --yes --no-progress

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish Configuration.DkimSigner
        run: |
          dotnet publish Configuration.DkimSigner/Configuration.DkimSigner.csproj `
            --configuration Release `
            --no-build `
            --output ./publish/Configuration.DkimSigner

      - name: Publish ExchangeDkimSigner
        run: |
          dotnet publish ExchangeDkimSigner/ExchangeDkimSigner.csproj `
            --configuration Release `
            --no-build `
            --output ./publish/ExchangeDkimSigner

      - name: Zip artifacts
        run: |
          Compress-Archive -Path ./publish/Configuration.DkimSigner/* `
            -DestinationPath ./publish/Configuration.DkimSigner.zip
          Compress-Archive -Path ./publish/ExchangeDkimSigner/* `
            -DestinationPath ./publish/ExchangeDkimSigner.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./publish/Configuration.DkimSigner.zip
            ./publish/ExchangeDkimSigner.zip
